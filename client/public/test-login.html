<!DOCTYPE html>
<html>
<head>
    <title>Voleena Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background: #45a049; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
        input { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🔐 Voleena Login Test Tool</h1>
    
    <div class="section">
        <h2>Step 1: Initialize Demo Accounts</h2>
        <p>Click this button to create/reset demo accounts with proper password hashing:</p>
        <button onclick="initializeAccounts()">Initialize Demo Accounts</button>
        <div id="init-output" class="output"></div>
    </div>

    <div class="section">
        <h2>Step 2: Test Login</h2>
        <input type="email" id="email" placeholder="Email (e.g., admin@gmail.com)" value="admin@gmail.com">
        <input type="password" id="password" placeholder="Password (e.g., adminpass)" value="adminpass">
        <button onclick="testLogin()">Test Login</button>
        <div id="login-output" class="output"></div>
    </div>

    <div class="section">
        <h2>View Stored Data</h2>
        <button onclick="viewStaff()">View Staff Accounts</button>
        <button onclick="viewCustomers()">View Customer Accounts</button>
        <button onclick="clearAll()">Clear All Data</button>
        <div id="view-output" class="output"></div>
    </div>

    <script>
        // SHA-256 hash function
        async function hashPassword(password) {
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hash = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hash));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            } catch (e) {
                return password; // fallback
            }
        }

        async function initializeAccounts() {
            const output = document.getElementById('init-output');
            output.innerHTML = 'Initializing accounts...\n';

            try {
                if (window.mockApi && window.mockApi.resetDemoData) {
                    await window.mockApi.resetDemoData();
                } else {
                    localStorage.removeItem('voleena_staff');
                    localStorage.removeItem('voleena_customers');
                }

                if (window.mockApi && window.mockApi.ensureDemoData) {
                    await window.mockApi.ensureDemoData();
                }

                const staff = JSON.parse(localStorage.getItem('voleena_staff') || '[]');
                const customers = JSON.parse(localStorage.getItem('voleena_customers') || '[]');

                output.innerHTML = '<span class="success">✅ Accounts initialized successfully!</span>\n\n';
                output.innerHTML += 'Staff Accounts:\n';
                staff.forEach(s => {
                    output.innerHTML += `  - ${s.name} (${s.email}) [${s.role}]\n`;
                });
                output.innerHTML += '\nCustomer Accounts:\n';
                customers.forEach(c => {
                    output.innerHTML += `  - ${c.name} (${c.email})\n`;
                });
            } catch (error) {
                output.innerHTML = '<span class="error">❌ Error: ' + error.message + '</span>';
            }
        }

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const output = document.getElementById('login-output');

            output.innerHTML = `Testing login for: ${email}\n`;

            try {
                // Hash the password
                const hashedPassword = await hashPassword(password);
                output.innerHTML += `Hashed password: ${hashedPassword}\n\n`;

                // Check staff
                const staff = JSON.parse(localStorage.getItem('voleena_staff') || '[]');
                const foundStaff = staff.find(s => s.email === email);

                if (foundStaff) {
                    output.innerHTML += `Found staff account: ${foundStaff.name}\n`;
                    output.innerHTML += `Stored hash: ${foundStaff.password}\n`;
                    output.innerHTML += `Input hash:  ${hashedPassword}\n`;
                    
                    if (foundStaff.password === hashedPassword) {
                        output.innerHTML += '\n<span class="success">✅ LOGIN SUCCESS!</span>\n';
                        output.innerHTML += `Role: ${foundStaff.role}\n`;
                    } else {
                        output.innerHTML += '\n<span class="error">❌ PASSWORD MISMATCH!</span>\n';
                    }
                    return;
                }

                // Check customers
                const customers = JSON.parse(localStorage.getItem('voleena_customers') || '[]');
                const foundCustomer = customers.find(c => c.email === email);

                if (foundCustomer) {
                    output.innerHTML += `Found customer account: ${foundCustomer.name}\n`;
                    output.innerHTML += `Stored hash: ${foundCustomer.password}\n`;
                    output.innerHTML += `Input hash:  ${hashedPassword}\n`;
                    
                    if (foundCustomer.password === hashedPassword) {
                        output.innerHTML += '\n<span class="success">✅ LOGIN SUCCESS!</span>\n';
                    } else {
                        output.innerHTML += '\n<span class="error">❌ PASSWORD MISMATCH!</span>\n';
                    }
                    return;
                }

                output.innerHTML += '\n<span class="error">❌ Account not found!</span>\n';
                output.innerHTML += 'Try initializing accounts first (Step 1)\n';

            } catch (error) {
                output.innerHTML = '<span class="error">❌ Error: ' + error.message + '</span>';
            }
        }

        function viewStaff() {
            const output = document.getElementById('view-output');
            const staff = JSON.parse(localStorage.getItem('voleena_staff') || '[]');
            output.innerHTML = 'Staff Accounts:\n' + JSON.stringify(staff, null, 2);
        }

        function viewCustomers() {
            const output = document.getElementById('view-output');
            const customers = JSON.parse(localStorage.getItem('voleena_customers') || '[]');
            output.innerHTML = 'Customer Accounts:\n' + JSON.stringify(customers, null, 2);
        }

        function clearAll() {
            if (confirm('Clear all demo data?')) {
                localStorage.clear();
                document.getElementById('view-output').innerHTML = '<span class="success">✅ All data cleared!</span>';
            }
        }
    </script>
</body>
</html>
