apiVersion: v1
kind: ConfigMap
metadata:
  name: voleena-backend-config
  namespace: voleena
data:
  NODE_ENV: "production"
  PORT: "3001"
  FRONTEND_URL: "https://app.example.com"
  BACKEND_URL: "https://api.example.com"

  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_NAME: "voleena_foods_db"
  DB_USER: "voleena_user"
  DB_POOL_MAX: "20"
  DB_POOL_MIN: "5"
  DB_TIMEZONE: "+05:30"

  RESTAURANT_LATITUDE: "7.0000000"
  RESTAURANT_LONGITUDE: "80.0000000"
  MAX_DELIVERY_DISTANCE_KM: "15"

  PAYHERE_MODE: "sandbox"

  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"

  EMAIL_PROVIDER: "resend"
  EMAIL_FROM: "onboarding@resend.dev"
  EMAIL_VERIFICATION_TTL_MINUTES: "30"

  SMS_PROVIDER: "console"

  BASE_DELIVERY_FEE: "100"
  FREE_DELIVERY_DISTANCE_KM: "3"
  DELIVERY_FEE_PER_KM: "20"
  MAX_DELIVERY_FEE: "300"

  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"

  ORDER_AUTO_CANCEL_MINUTES: "30"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: voleena
data:
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      gzip on;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
      gzip_min_length 1000;

      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri /index.html;
      }

      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
      }
    }
