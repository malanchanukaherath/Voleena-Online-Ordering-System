
services:
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: voleena_foods_db
      MYSQL_USER: voleena_user
      MYSQL_PASSWORD: voleena
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/;ib/mysql 

  backend:
    build: ./server
    container_name: backend_app
    restart: always
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
      #Ensures backend starts after frontend
    depends_on:
      - db

  frontend:
    build: ./client
    container_name: frontend_app
    restart: always
    ports:
      - "5173:80"
      #Ensures frontend starts after backend
    depends_on:
      - backend

volumes:
  db_data: