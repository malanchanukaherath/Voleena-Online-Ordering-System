services:
  mysql:
    image: mysql:8.0
    container_name: voleena-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: voleena_foods_db
      MYSQL_USER: voleena_user
      MYSQL_PASSWORD: voleena_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/production_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - voleena-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: voleena-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: http://localhost:8080
      BACKEND_URL: http://localhost:3001

      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: voleena_foods_db
      DB_USER: voleena_user
      DB_PASSWORD: voleena_password
      DB_POOL_MAX: "20"
      DB_POOL_MIN: "5"

      JWT_SECRET: "dev_jwt_secret_minimum_32_characters_long!@#_v1"
      JWT_REFRESH_SECRET: "dev_refresh_secret_minimum_32_characters!@#_v1"
      JWT_EXPIRE: "30m"
      JWT_REFRESH_EXPIRE: "7d"

      GOOGLE_MAPS_API_KEY: "replace_me"
      RESTAURANT_LATITUDE: "7.0000000"
      RESTAURANT_LONGITUDE: "80.0000000"
      MAX_DELIVERY_DISTANCE_KM: "15"

      STRIPE_SECRET_KEY: "replace_me"
      STRIPE_WEBHOOK_SECRET: "replace_me"
      STRIPE_PUBLISHABLE_KEY: "replace_me"

      PAYHERE_MERCHANT_ID: "replace_me"
      PAYHERE_MERCHANT_SECRET: "replace_me"
      PAYHERE_MODE: "sandbox"

      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: "replace_me"
      SMTP_PASS: "replace_me"
      SMTP_FROM: "replace_me"

      EMAIL_PROVIDER: "resend"
      RESEND_API_KEY: "replace_me"
      EMAIL_FROM: "onboarding@resend.dev"
      EMAIL_VERIFICATION_TTL_MINUTES: "30"

      CLOUDINARY_CLOUD_NAME: "replace_me"
      CLOUDINARY_API_KEY: "replace_me"
      CLOUDINARY_API_SECRET: "replace_me"
      CLOUDINARY_ROOT_FOLDER: "voleena"

      SMS_PROVIDER: "console"
      TWILIO_ACCOUNT_SID: "replace_me"
      TWILIO_AUTH_TOKEN: "replace_me"
      TWILIO_PHONE_NUMBER: "replace_me"

      BASE_DELIVERY_FEE: "100"
      FREE_DELIVERY_DISTANCE_KM: "3"
      DELIVERY_FEE_PER_KM: "20"
      MAX_DELIVERY_FEE: "300"

      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "100"

    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - voleena-net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
        VITE_GOOGLE_MAPS_API_KEY: replace_me
        VITE_STRIPE_PUBLISHABLE_KEY: replace_me
    container_name: voleena-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - voleena-net

volumes:
  mysql_data:

networks:
  voleena-net:
    driver: bridge