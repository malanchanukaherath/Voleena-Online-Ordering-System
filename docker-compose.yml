
services:
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: voleena_foods_db
      MYSQL_USER: voleena_user
      MYSQL_PASSWORD: voleena
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./server
    container_name: backend_app
    restart: always
    env_file:
      - ./server/.env
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./client
    container_name: frontend_app
    restart: always
    ports:
      - "5173:80"
      #Ensures frontend starts after backend
    depends_on:
      - backend

volumes:
  db_data: