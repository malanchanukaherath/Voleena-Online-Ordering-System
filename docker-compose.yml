
services:
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: voleena_foods_db
      MYSQL_USER: voleena_user
      MYSQL_PASSWORD: voleena
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/safe_schema_full_completion_v2_4.sql:/docker-entrypoint-initdb.d/01-safe-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./server
    container_name: backend_app
    restart: always
    env_file:
      - ./server/.env
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3001}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: frontend_app
    restart: always
    ports:
      - "5173:80"
      #Ensures frontend starts after backend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  db_sync:
    image: mysql:8
    container_name: db_sync_job
    profiles: ["init"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_DATABASE: voleena_foods_db
      MYSQL_USER: voleena_user
      MYSQL_PASSWORD: voleena
    volumes:
      - ./database:/database:ro
    command: >
      sh -c "
      echo 'Applying safe schema sync...';
      mysql -h db -u$$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE < /database/safe_schema_sync_v2_4.sql;
      echo 'Schema sync completed.'
      "

  backend_seed:
    build: ./server
    container_name: backend_seed_job
    profiles: ["init"]
    restart: "no"
    env_file:
      - ./server/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3001}
    command: ["node", "seed_roles_and_staff.js"]
    depends_on:
      db_sync:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

volumes:
  db_data:
