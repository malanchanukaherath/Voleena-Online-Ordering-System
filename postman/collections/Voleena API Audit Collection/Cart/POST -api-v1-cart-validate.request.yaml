$kind: http-request
name: POST /api/v1/cart/validate
description: |-
  Auth: Public
  Query: -
  Body: items[]
  Success: 200 { success, data: { isValid, errors, items, validatedAt } }
  Errors: 400, 500
url: "{{baseUrl}}/api/v1/cart/validate"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "items": [
        {
          "menuItemId": 1,
          "quantity": 2
        }
      ]
    }
order: 1000
