$kind: http-request
name: POST /api/v1/cart/summary
description: |-
  Auth: Public
  Query: -
  Body: items[], orderType
  Success: 200 { success, data: { itemDetails, subtotal, deliveryFee, total } }
  Errors: 400, 500
url: "{{baseUrl}}/api/v1/cart/summary"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "items": [
        {
          "menuItemId": 1,
          "quantity": 2
        }
      ],
      "orderType": "DELIVERY"
    }
order: 2000
