$kind: http-request
name: PUT /api/v1/delivery/availability
description: |-
  Auth: Bearer Delivery/Admin
  Query: -
  Body: isAvailable
  Success: 200 { success, message, isAvailable }
  Errors: 400, 401, 403, 500
url: "{{baseUrl}}/api/v1/delivery/availability"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "isAvailable": true
    }
order: 13000
