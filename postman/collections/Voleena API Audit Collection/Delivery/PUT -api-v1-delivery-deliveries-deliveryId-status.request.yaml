$kind: http-request
name: PUT /api/v1/delivery/deliveries/:deliveryId/status
description: |-
  Auth: Bearer Delivery/Admin
  Query: -
  Body: status, notes?, proof?
  Success: 200 { success, message, data }
  Errors: 400, 401, 403, 404, 500
url: "{{baseUrl}}/api/v1/delivery/deliveries/{{deliveryId}}/status"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "status": "IN_TRANSIT",
      "notes": "Picked up from kitchen"
    }
order: 8000
