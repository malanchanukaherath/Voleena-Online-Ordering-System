$kind: http-request
name: POST /api/v1/payments/initiate
description: |-
  Auth: Bearer Customer
  Query: -
  Body: orderId, paymentMethod
  Success: 200 { success, data }
  Errors: 400, 401, 403, 404, 409, 500
url: "{{baseUrl}}/api/v1/payments/initiate"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "orderId": 1001,
      "paymentMethod": "CARD"
    }
order: 1000
