$kind: http-request
name: POST /api/v1/payments/webhook/stripe
description: |-
  Auth: Public (Stripe signature header)
  Query: -
  Body: raw Stripe event payload
  Success: 200 { received: true } or { ignored: true }
  Errors: 400, 501
url: "{{baseUrl}}/api/v1/payments/webhook/stripe"
method: POST
headers:
  stripe-signature: "{{stripeSignature}}"
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "evt_test",
      "type": "payment_intent.processing",
      "data": {
        "object": {
          "id": "pi_test"
        }
      }
    }
order: 3000
