$kind: http-request
name: PUT /api/v1/stock/update/:stockId
description: |-
  Auth: Bearer Admin/Kitchen
  Query: -
  Body: openingQuantity
  Success: 200 updated stock payload
  Errors: 400, 401, 403, 404, 500
url: "{{baseUrl}}/api/v1/stock/update/{{stockId}}"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "openingQuantity": 30
    }
order: 1000
