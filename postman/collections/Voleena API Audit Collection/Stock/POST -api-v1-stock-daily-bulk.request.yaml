$kind: http-request
name: POST /api/v1/stock/daily/bulk
description: |-
  Auth: Bearer Admin/Kitchen
  Query: -
  Body: items[]
  Success: 200 bulk result
  Errors: 400, 401, 403, 500
url: "{{baseUrl}}/api/v1/stock/daily/bulk"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "items": [
        {
          "menuItemId": 1,
          "openingQuantity": 25
        },
        {
          "menuItemId": 2,
          "openingQuantity": 10
        }
      ]
    }
order: 7000
