$kind: http-request
name: POST /api/v1/admin/delivery/assign
description: |-
  Auth: Bearer Admin
  Query: -
  Body: orderId, deliveryStaffId
  Success: 200 assignment result
  Errors: 400, 404, 409, 500
url: "{{baseUrl}}/api/v1/admin/delivery/assign"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "orderId": 1001,
      "deliveryStaffId": 12
    }
order: 9000
