$kind: http-request
name: PUT /api/v1/admin/staff/:id
description: |-
  Auth: Bearer Admin
  Query: -
  Body: name?, phone?, roleId?, isActive?
  Success: 200 update result
  Errors: 400, 404, 500
url: "{{baseUrl}}/api/v1/admin/staff/{{id}}"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "isActive": true
    }
order: 6000
