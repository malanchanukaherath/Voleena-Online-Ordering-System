$kind: http-request
name: PUT /api/v1/kitchen/orders/:orderId/status
description: |-
  Auth: Bearer Kitchen/Admin
  Query: -
  Body: status, notes?
  Success: 200 update result
  Errors: 400, 401, 403, 404, 500
url: "{{baseUrl}}/api/v1/kitchen/orders/{{orderId}}/status"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "status": "READY",
      "notes": "Packed and ready"
    }
order: 3000
