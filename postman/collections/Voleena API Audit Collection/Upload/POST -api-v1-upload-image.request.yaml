$kind: http-request
name: POST /api/v1/upload/image
description: |-
  Auth: Bearer token
  Query: -
  Body: multipart: image, folder?
  Success: 200 upload result
  Errors: 400, 401, 500
url: "{{baseUrl}}/api/v1/upload/image"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
order: 2000
