$kind: http-request
name: POST /api/v1/staff
description: |-
  Auth: Bearer Admin
  Query: -
  Body: name, email, phone, password, roleId, profileImageUrl?
  Success: 201 { message, staff }
  Errors: 400, 409, 500
url: "{{baseUrl}}/api/v1/staff"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Kitchen User",
      "email": "kitchen@example.com",
      "phone": "+94771112233",
      "password": "Secret123",
      "roleId": 3
    }
order: 2000
