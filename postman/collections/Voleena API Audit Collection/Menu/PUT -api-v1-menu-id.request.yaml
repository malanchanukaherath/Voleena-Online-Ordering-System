$kind: http-request
name: PUT /api/v1/menu/:id
description: |-
  Auth: Bearer Admin/Kitchen
  Query: -
  Body: Name?, Description?, Price?, CategoryID?, IsActive?, ImageURL?
  Success: 200 { success, data }
  Errors: 400, 404, 500
url: "{{baseUrl}}/api/v1/menu/{{id}}"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "Price": 1350,
      "IsActive": true
    }
order: 4000
