$kind: http-request
name: POST /api/v1/categories
description: |-
  Auth: Bearer Admin
  Query: -
  Body: Name, Description?, DisplayOrder?, IsActive?, ImageURL?
  Success: 201 { success, data }
  Errors: 400, 409, 500
url: "{{baseUrl}}/api/v1/categories"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "Name": "Desserts",
      "Description": "Sweet dishes",
      "DisplayOrder": 3,
      "IsActive": true
    }
order: 2000
