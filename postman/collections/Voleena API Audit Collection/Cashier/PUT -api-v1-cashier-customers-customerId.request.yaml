$kind: http-request
name: PUT /api/v1/cashier/customers/:customerId
description: |-
  Auth: Bearer Cashier/Admin
  Query: -
  Body: name?, phone?, email?, accountStatus?
  Success: 200 update result
  Errors: 400, 404, 500
url: "{{baseUrl}}/api/v1/cashier/customers/{{customerId}}"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "accountStatus": "ACTIVE"
    }
order: 9000
