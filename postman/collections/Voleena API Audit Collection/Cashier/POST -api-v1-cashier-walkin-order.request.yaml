$kind: http-request
name: POST /api/v1/cashier/walkin-order
description: |-
  Auth: Bearer Cashier/Admin
  Query: -
  Body: customerId?, items[], paymentMethod, notes?
  Success: 201/200 walk-in order result
  Errors: 400, 401, 403, 500
url: "{{baseUrl}}/api/v1/cashier/walkin-order"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "items": [
        {
          "menuItemId": 1,
          "quantity": 1
        }
      ],
      "paymentMethod": "CASH",
      "notes": "Walk-in guest"
    }
order: 3000
