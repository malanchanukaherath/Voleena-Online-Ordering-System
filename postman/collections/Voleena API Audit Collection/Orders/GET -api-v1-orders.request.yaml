$kind: http-request
name: GET /api/v1/orders
description: |-
  Auth: Bearer token
  Query: status, orderType, startDate, endDate
  Body: -
  Success: 200 { success, data, count }
  Errors: 401, 500
url: "{{baseUrl}}/api/v1/orders"
method: GET
headers:
  Authorization: Bearer {{accessToken}}
order: 2000
