$kind: http-request
name: DELETE /api/v1/orders/:id
description: |-
  Auth: Bearer token
  Query: -
  Body: reason
  Success: 200 { success, message, data }
  Errors: 400, 401, 403
url: "{{baseUrl}}/api/v1/orders/{{id}}"
method: DELETE
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "reason": "Need to update order items"
    }
order: 6000
