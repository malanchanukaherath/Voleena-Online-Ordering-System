$kind: http-request
name: PATCH /api/v1/orders/:id/status
description: |-
  Auth: Bearer Staff
  Query: -
  Body: status, notes?
  Success: 200 { success, message, data }
  Errors: 401, 403, 500
url: "{{baseUrl}}/api/v1/orders/{{id}}/status"
method: PATCH
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "status": "READY",
      "notes": "Ready for pickup"
    }
order: 5000
