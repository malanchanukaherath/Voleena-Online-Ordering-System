$kind: http-request
name: POST /api/v1/auth/verify-email
description: |-
  Auth: Public
  Query: -
  Body: token
  Success: 200 { success, message }
  Errors: 400 invalid/used/expired token, 500
url: "{{baseUrl}}/api/v1/auth/verify-email"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "token": "64-char-hex-token"
    }
order: 4000
