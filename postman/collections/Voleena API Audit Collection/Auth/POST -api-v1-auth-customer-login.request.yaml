$kind: http-request
name: POST /api/v1/auth/customer/login
description: |-
  Auth: Public
  Query: -
  Body: email, password
  Success: 200 { success, token, refreshToken, user, expiresIn }
  Errors: 400, 401, 403 EMAIL_NOT_VERIFIED, 500
url: "{{baseUrl}}/api/v1/auth/customer/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "customer@example.com",
      "password": "Secret123"
    }
order: 2000
