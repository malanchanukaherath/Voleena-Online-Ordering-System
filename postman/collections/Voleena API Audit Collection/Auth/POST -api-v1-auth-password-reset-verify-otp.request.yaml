$kind: http-request
name: POST /api/v1/auth/password-reset/verify-otp
description: |-
  Auth: Public
  Query: -
  Body: email, otp
  Success: 200 verification success
  Errors: 400, 429, 500
url: "{{baseUrl}}/api/v1/auth/password-reset/verify-otp"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "jane@example.com",
      "otp": "123456"
    }
order: 10000
