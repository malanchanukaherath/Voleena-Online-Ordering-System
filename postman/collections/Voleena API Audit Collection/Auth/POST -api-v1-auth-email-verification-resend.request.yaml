$kind: http-request
name: POST /api/v1/auth/email-verification/resend
description: |-
  Auth: Public
  Query: -
  Body: email
  Success: 200 generic success response
  Errors: 400, 429, 500
url: "{{baseUrl}}/api/v1/auth/email-verification/resend"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "jane@example.com"
    }
order: 5000
