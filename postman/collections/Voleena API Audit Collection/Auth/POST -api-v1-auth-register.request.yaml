$kind: http-request
name: POST /api/v1/auth/register
description: |-
  Auth: Public
  Query: -
  Body: name, email, phone, password, profileImageUrl?
  Success: 201 { success, requiresEmailVerification, emailSent, message }
  Errors: 400, 409, 500
url: "{{baseUrl}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Jane Customer",
      "email": "jane@example.com",
      "phone": "+94771234567",
      "password": "Secret123"
    }
order: 3000
