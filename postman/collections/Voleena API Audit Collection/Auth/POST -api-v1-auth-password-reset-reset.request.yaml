$kind: http-request
name: POST /api/v1/auth/password-reset/reset
description: |-
  Auth: Public
  Query: -
  Body: email, otp, password
  Success: 200 reset success
  Errors: 400, 429, 500
url: "{{baseUrl}}/api/v1/auth/password-reset/reset"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "jane@example.com",
      "otp": "123456",
      "password": "NewSecret123"
    }
order: 11000
