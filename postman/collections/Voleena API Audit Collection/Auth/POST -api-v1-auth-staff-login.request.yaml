$kind: http-request
name: POST /api/v1/auth/staff/login
description: |-
  Auth: Public
  Query: -
  Body: email, password
  Success: 200 { success, token, refreshToken, user, expiresIn }
  Errors: 400, 401, 500
url: "{{baseUrl}}/api/v1/auth/staff/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@voleena.com",
      "password": "Admin@123"
    }
order: 1000
