name: Frontend Accessibility (Lighthouse)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/frontend-a11y-lighthouse.yml'

permissions:
  contents: read

jobs:
  lighthouse-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Lighthouse CI accessibility checks
        run: npx --yes @lhci/cli autorun --config=./lighthouserc.json
