name: CD - Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production

    env:
      NAMESPACE: voleena
      REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMaps
        run: |
          kubectl apply -f k8s/01-configmap.yaml

      - name: Apply Secrets
        run: |
          kubectl -n ${{ env.NAMESPACE }} create secret generic voleena-backend-secret \
            --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --from-literal=JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
            --from-literal=GOOGLE_MAPS_API_KEY='${{ secrets.GOOGLE_MAPS_API_KEY }}' \
            --from-literal=STRIPE_SECRET_KEY='${{ secrets.STRIPE_SECRET_KEY }}' \
            --from-literal=STRIPE_WEBHOOK_SECRET='${{ secrets.STRIPE_WEBHOOK_SECRET }}' \
            --from-literal=STRIPE_PUBLISHABLE_KEY='${{ secrets.STRIPE_PUBLISHABLE_KEY }}' \
            --from-literal=SMTP_HOST='${{ secrets.SMTP_HOST }}' \
            --from-literal=SMTP_PORT='${{ secrets.SMTP_PORT }}' \
            --from-literal=SMTP_SECURE='${{ secrets.SMTP_SECURE }}' \
            --from-literal=SMTP_USER='${{ secrets.SMTP_USER }}' \
            --from-literal=SMTP_PASS='${{ secrets.SMTP_PASS }}' \
            --from-literal=SMTP_FROM='${{ secrets.SMTP_FROM }}' \
            --from-literal=RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
            --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl -n ${{ env.NAMESPACE }} create secret generic mysql-secret \
            --from-literal=MYSQL_ROOT_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}' \
            --from-literal=MYSQL_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply PV and PVC
        run: |
          kubectl apply -f k8s/03-pv-pvc.yaml

      - name: Apply MySQL Deployment
        run: |
          kubectl apply -f k8s/04-mysql.yaml

      - name: Wait for MySQL to be ready
        run: |
          kubectl -n ${{ env.NAMESPACE }} wait --for=condition=ready pod -l app=mysql --timeout=300s

      - name: Update Backend image
        run: |
          kubectl -n ${{ env.NAMESPACE }} set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/voleena-backend:main-${{ env.IMAGE_TAG }} \
            --record

      - name: Update Frontend image
        run: |
          kubectl -n ${{ env.NAMESPACE }} set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/voleena-frontend:main-${{ env.IMAGE_TAG }} \
            --record

      - name: Wait for Backend rollout
        run: |
          kubectl -n ${{ env.NAMESPACE }} rollout status deployment/backend --timeout=300s

      - name: Wait for Frontend rollout
        run: |
          kubectl -n ${{ env.NAMESPACE }} rollout status deployment/frontend --timeout=300s

      - name: Verify deployment
        run: |
          kubectl -n ${{ env.NAMESPACE }} get all
          kubectl -n ${{ env.NAMESPACE }} get services
          echo "✅ Deployment successful!"
