name: EC2 Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ec2-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: voleena-backend
            context: ./server
          - image: voleena-frontend
            context: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.202.87.92
          port: 22
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 30m
          debug: false
          script_stop: true
          script: |
            set -e
            export DEPLOY_STRATEGY=pull
            export DOCKERHUB_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
            export IMAGE_TAG="sha-${{ github.sha }}"
            cd ~/Voleena-Online-Ordering-System
            git fetch origin
            git pull --ff-only origin main
            bash scripts/deploy-ec2.sh
