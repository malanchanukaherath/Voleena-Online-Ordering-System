name: EC2 Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      seed_accounts:
        description: Seed known login accounts on EC2
        required: false
        default: false
        type: boolean
      run_db_sync:
        description: Apply safe schema sync on EC2 before restarting app
        required: false
        default: false
        type: boolean
      run_v27_addon_migration:
        description: Apply v2.7 add-on safety migration on EC2 before restarting app
        required: false
        default: false
        type: boolean

concurrency:
  group: ec2-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - image: voleena-backend
            context: ./server
          - image: voleena-frontend
            context: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          build-args: |
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: [self-hosted, linux, x64, voleena-ec2]
    needs: build
    timeout-minutes: 30
    steps:
      - name: Runner preflight checks
        run: |
          set -euo pipefail
          whoami
          docker --version
          docker ps >/dev/null
          test -d ~/Voleena-Online-Ordering-System
          test -f ~/Voleena-Online-Ordering-System/scripts/deploy-ec2.sh
          chmod +x ~/Voleena-Online-Ordering-System/deploy-ec2.sh ~/Voleena-Online-Ordering-System/scripts/deploy-ec2.sh

      - name: Deploy locally on EC2
        env:
          DEPLOY_STRATEGY: pull
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: sha-${{ github.sha }}
          RUN_ACCOUNT_SEED: ${{ github.event.inputs.seed_accounts || 'false' }}
          RUN_DB_SYNC: ${{ github.event.inputs.run_db_sync || 'false' }}
          RUN_DB_MIGRATION_V27: ${{ github.event.inputs.run_v27_addon_migration || 'false' }}
          TARGET_BRANCH: main
        run: |
          set -euo pipefail
          cd ~/Voleena-Online-Ordering-System
          git fetch origin
          git pull --ff-only origin main
          bash scripts/deploy-ec2.sh
