name: EC2 Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ec2-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 30m
          debug: false
          script_stop: true
          script: |
            set -e
            cd ~/Voleena-Online-Ordering-System
            git fetch origin
            git pull --ff-only origin main
            bash scripts/deploy-ec2.sh
